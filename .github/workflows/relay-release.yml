name: Relay — Build & Release Docker Image

on:
  push:
    branches:
      - relay # Triggers on every push to the relay branch
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to push"
        required: false
        default: "dev"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/rfshare-relay

jobs:
  build-and-push:
    name: Build & push relay image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Updated logic to handle branch pushes
      - name: Resolve image tag
        id: meta_tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            # Use 'latest' or a short SHA for branch pushes
            TAG="latest"
          else
            TAG="${{ inputs.tag }}"
          fi

          SEMVER="${TAG#v}"
          echo "raw=${TAG}"       >> "$GITHUB_OUTPUT"
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.meta_tag.outputs.raw }}
            type=raw,value=${{ steps.meta_tag.outputs.semver }}
            # Also tag with the git short SHA for push events to track versions
            type=sha,enable=${{ github.event_name == 'push' }}
          labels: |
            org.opencontainers.image.title=rfshare-relay
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./relay/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
