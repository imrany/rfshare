name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # --------------------------------------------------------------------------
  # 1. Build cross-platform binaries
  # --------------------------------------------------------------------------
  build:
    name: Build · ${{ matrix.platform.name }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: rfshare-linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: rfshare
            ext: tar.gz

          - name: rfshare-windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: rfshare.exe
            ext: zip

          - name: rfshare-macos
            os: macos-latest
            target: x86_64-apple-darwin
            bin: rfshare
            ext: tar.gz

    runs-on: ${{ matrix.platform.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.platform.target }}

      - name: Install Linux system deps
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libgdk-pixbuf2.0-dev \
            libatk1.0-dev \
            libxdo-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev \
            pkg-config

      - name: Install macOS system deps (if needed)
        if: matrix.platform.os == 'macos-latest'
        run: |
          brew install pkg-config

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.platform.target }}

      # -- Package -------------------------------------------------------------
      - name: Package (tar.gz — Linux / macOS)
        if: matrix.platform.ext == 'tar.gz'
        run: |
          cd target/${{ matrix.platform.target }}/release
          tar czf \
            ../../../${{ matrix.platform.name }}-${{ github.ref_name }}.tar.gz \
            ${{ matrix.platform.bin }}

      - name: Package (zip — Windows)
        if: matrix.platform.ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path   "target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }}" `
            -DestinationPath "${{ matrix.platform.name }}-${{ github.ref_name }}.zip"

      # -- Checksums ------------------------------------------------------------
      - name: Checksum (Unix)
        if: matrix.platform.os != 'windows-latest'
        run: |
          shasum -a 256 \
            "${{ matrix.platform.name }}-${{ github.ref_name }}.${{ matrix.platform.ext }}" \
            > "${{ matrix.platform.name }}-${{ github.ref_name }}.${{ matrix.platform.ext }}.sha256"

      - name: Checksum (Windows)
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        run: |
          $file = "${{ matrix.platform.name }}-${{ github.ref_name }}.${{ matrix.platform.ext }}"
          $hash = (Get-FileHash -Algorithm SHA256 $file).Hash.ToLower()
          "$hash  $file" | Out-File -Encoding ASCII "$file.sha256"

      # -- Upload artifacts for installer jobs ----------------------------------
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.name }}-${{ github.ref_name }}
          path: |
            ${{ matrix.platform.name }}-${{ github.ref_name }}.${{ matrix.platform.ext }}
            ${{ matrix.platform.name }}-${{ github.ref_name }}.${{ matrix.platform.ext }}.sha256
          retention-days: 1

  # --------------------------------------------------------------------------
  # 2a. Linux installer: .deb (via cargo-deb)
  # --------------------------------------------------------------------------
  installer-deb:
    name: Installer · Linux .deb
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + Linux deps
        uses: dtolnay/rust-toolchain@stable
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libgdk-pixbuf2.0-dev \
            libatk1.0-dev \
            libxdo-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev \
            imagemagick \
            pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-deb-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      # Add the Debian metadata to Cargo.toml that cargo-deb needs
      - name: Inject cargo-deb metadata
        shell: bash
        run: |
          cat >> Cargo.toml << 'TOML'

          [package.metadata.deb]
          maintainer     = "Imrany <imranmat254@gmail.com>"
          copyright      = "2025, Imrany"
          license-file   = ["LICENSE", "0"]
          extended-description = "rfshare lets you instantly send files between devices on the same Wi-Fi using end-to-end encryption. No internet, no cloud, no accounts required."
          depends        = "$auto, libgtk-3-0, libxdo3, libx11-6"
          section        = "net"
          priority       = "optional"
          assets = [
            ["target/release/rfshare",   "usr/local/bin/",             "755"],
            ["rfshare.desktop",           "usr/share/applications/",    "644"],
            ["assets/icon.png",           "usr/share/icons/hicolor/256x256/apps/rfshare.png", "644"],
            ["README.md",                 "usr/share/doc/rfshare/",     "644"],
          ]
          TOML

      - name: Install multi-res icons
        run: |
          mkdir -p assets/icons
          for size in 16 32 48 64 128; do
            convert assets/icon.png -resize "${size}x${size}" "assets/icons/rfshare_${size}.png"
          done

      - name: Build .deb
        run: cargo deb

      - name: Rename .deb with version tag
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          DEB=$(ls target/debian/*.deb | head -1)
          cp "$DEB" "rfshare-${{ github.ref_name }}-linux-x86_64.deb"

      - name: Checksum .deb
        run: |
          sha256sum "rfshare-${{ github.ref_name }}-linux-x86_64.deb" \
            > "rfshare-${{ github.ref_name }}-linux-x86_64.deb.sha256"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-deb-${{ github.ref_name }}
          path: |
            rfshare-${{ github.ref_name }}-linux-x86_64.deb
            rfshare-${{ github.ref_name }}-linux-x86_64.deb.sha256
          retention-days: 1

  # --------------------------------------------------------------------------
  # 2b. macOS installer: .dmg
  # --------------------------------------------------------------------------
  installer-dmg:
    name: Installer · macOS .dmg
    needs: build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download macOS binary artifact
        uses: actions/download-artifact@v4
        with:
          name: rfshare-macos-${{ github.ref_name }}
          path: dist-bin

      - name: Extract binary
        run: |
          tar -xzf dist-bin/rfshare-macos-${{ github.ref_name }}.tar.gz -C dist-bin
          chmod +x dist-bin/rfshare

      - name: Build .app bundle
        run: |
          APP="rfshare.app"
          VER="${{ github.ref_name }}"
          VER="${VER#v}"

          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp dist-bin/rfshare "$APP/Contents/MacOS/rfshare"
          chmod +x "$APP/Contents/MacOS/rfshare"

          ICONSET=$(mktemp -d)/rfshare.iconset
          mkdir -p "$ICONSET"
          for size in 16 32 64 128 256 512; do
            sips -z $size $size assets/icon.png --out "$ICONSET/icon_${size}x${size}.png" >/dev/null
            sips -z $((size*2)) $((size*2)) assets/icon.png --out "$ICONSET/icon_${size}x${size}@2x.png" >/dev/null
          done
          iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/rfshare.icns"

          cat > "$APP/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>rfshare</string>
            <key>CFBundleDisplayName</key><string>rfshare</string>
            <key>CFBundleIdentifier</key><string>dev.rfshare.app</string>
            <key>CFBundleVersion</key><string>${VER}</string>
            <key>CFBundleShortVersionString</key><string>${VER}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleExecutable</key><string>rfshare</string>
            <key>CFBundleIconFile</key><string>rfshare</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>LSMinimumSystemVersion</key><string>10.14</string>
          </dict></plist>
          EOF

      # -- Wrap in .dmg -----------------------------------------------------
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create .dmg
        run: |
          create-dmg \
            --volname    "rfshare ${{ github.ref_name }}" \
            --volicon    "assets/icon.icns" \
            --background "assets/dmg-background.png" \
            --window-pos  200 120 \
            --window-size 540 380 \
            --icon-size   100 \
            --icon        "rfshare.app" 160 185 \
            --hide-extension "rfshare.app" \
            --app-drop-link  380 185 \
            "rfshare-${{ github.ref_name }}-macos.dmg" \
            "rfshare.app" \
          || \
          create-dmg \
            --volname "rfshare ${{ github.ref_name }}" \
            --icon-size 100 \
            --icon "rfshare.app" 160 185 \
            --hide-extension "rfshare.app" \
            --app-drop-link 380 185 \
            "rfshare-${{ github.ref_name }}-macos.dmg" \
            "rfshare.app"

      - name: Checksum .dmg
        run: |
          shasum -a 256 "rfshare-${{ github.ref_name }}-macos.dmg" \
            > "rfshare-${{ github.ref_name }}-macos.dmg.sha256"

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-dmg-${{ github.ref_name }}
          path: |
            rfshare-${{ github.ref_name }}-macos.dmg
            rfshare-${{ github.ref_name }}-macos.dmg.sha256
          retention-days: 1

  # --------------------------------------------------------------------------
  # 2c. Windows installer: .msi (WiX v4) + portable .zip
  # --------------------------------------------------------------------------
  installer-msi:
    name: Installer · Windows .msi
    needs: build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows binary artifact
        uses: actions/download-artifact@v4
        with:
          name: rfshare-windows-${{ github.ref_name }}
          path: dist-bin

      - name: Extract binary
        shell: pwsh
        run: |
          Expand-Archive `
            -Path "dist-bin\rfshare-windows-${{ github.ref_name }}.zip" `
            -DestinationPath dist-bin -Force
          # Confirm binary is present
          if (-not (Test-Path "dist-bin\rfshare.exe")) {
            Get-ChildItem dist-bin -Recurse
            throw "rfshare.exe not found after extraction"
          }
          Write-Host "Binary found: dist-bin\rfshare.exe"

      - name: Install WiX v4
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.0.5
          wix extension add WixToolset.UI.wixext/4.0.5
          wix --version

      - name: Patch version + ensure UTF-8 no-BOM
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v")

          # Read as bytes first to detect and strip any BOM
          $bytes = [System.IO.File]::ReadAllBytes("wix\main.wxs")
          # UTF-8 BOM is EF BB BF
          if ($bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF) {
            Write-Host "BOM detected — stripping it"
            $bytes = $bytes[3..($bytes.Length - 1)]
          }
          $content = [System.Text.Encoding]::UTF8.GetString($bytes)

          # Patch the Version attribute on the <Package element
          $content = $content -replace `
            '(<Package\b[^>]*\bVersion\s*=\s*")[^"]*(")', `
            "`${1}$ver`${2}"

          # Write back as UTF-8 without BOM, Unix line endings to be safe
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText(
            (Resolve-Path "wix\main.wxs").Path,
            $content,
            $utf8NoBom
          )

          # Verify first byte is '<' (0x3C), not a BOM
          $check = [System.IO.File]::ReadAllBytes("wix\main.wxs")
          if ($check[0] -ne 0x3C) {
            throw "File still starts with 0x$($check[0].ToString("X2")) — expected 0x3C (<)"
          }

          # Quick XML parse to catch any syntax errors early
          $xml = New-Object System.Xml.XmlDocument
          $xml.Load((Resolve-Path "wix\main.wxs").Path)
          Write-Host "Version patched to $ver — XML valid — first byte is '<' ✓"

      - name: Stage files for WiX
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path wix\stage -Force | Out-Null
          Copy-Item dist-bin\rfshare.exe wix\stage\rfshare.exe -Force
          Copy-Item assets\icon.ico      wix\stage\rfshare.ico  -Force
          Write-Host "Staged: $(Get-ChildItem wix\stage | Select-Object -ExpandProperty Name)"

      - name: Build .msi
        shell: pwsh
        run: |
          $root  = (Get-Location).Path
          $stage = "$root\wix\stage"
          $out   = "$root\rfshare-${{ github.ref_name }}-windows-x64.msi"
          Write-Host "Stage dir: $stage"
          Write-Host "Files in stage: $(Get-ChildItem $stage | Select-Object -ExpandProperty Name)"
          wix build "$root\wix\main.wxs" `
            -b "$stage" `
            -o "$out"
          Write-Host "MSI created: $out"

      - name: Checksum .msi
        shell: pwsh
        run: |
          $f    = "rfshare-${{ github.ref_name }}-windows-x64.msi"
          $hash = (Get-FileHash -Algorithm SHA256 $f).Hash.ToLower()
          "$hash  $f" | Out-File -Encoding ASCII "$f.sha256"

      - name: Upload .msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-msi-${{ github.ref_name }}
          path: |
            rfshare-${{ github.ref_name }}-windows-x64.msi
            rfshare-${{ github.ref_name }}-windows-x64.msi.sha256
          retention-days: 1

  # --------------------------------------------------------------------------
  # 3. Publish GitHub Release with all binaries + installers
  # --------------------------------------------------------------------------
  publish:
    name: Publish Release
    needs: [build, installer-deb, installer-dmg, installer-msi]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Download every artifact produced above
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      # Auto-generate release notes from commit messages since last tag
      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1 || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            RANGE="${PREV_TAG}..${{ github.ref_name }}"
          else
            RANGE="${{ github.ref_name }}"
          fi
          {
            echo 'NOTES<<EOF'
            echo "### What's changed"
            git log --pretty="- %s (%h)" "$RANGE" -- 2>/dev/null | head -40 || echo "- Initial release"
            echo ""
            echo "---"
            echo ""
            echo "### Installation"
            echo ""
            echo "**Linux / macOS (one-liner)**"
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/imrany/rfshare/main/scripts/install.sh | bash"
            echo '```'
            echo ""
            echo "**Windows (PowerShell)**"
            echo '```powershell'
            echo "irm https://raw.githubusercontent.com/imrany/rfshare/main/scripts/install.ps1 | iex"
            echo '```'
            echo ""
            echo "### Downloads"
            echo ""
            echo "| Platform | Installer | Portable binary |"
            echo "|----------|-----------|-----------------|"
            echo "| 🐧 Linux | \`rfshare-${{ github.ref_name }}-linux-x86_64.deb\` | \`rfshare-linux-${{ github.ref_name }}.tar.gz\` |"
            echo "| 🍎 macOS | \`rfshare-${{ github.ref_name }}-macos.dmg\` | \`rfshare-macos-${{ github.ref_name }}.tar.gz\` |"
            echo "| 🪟 Windows | \`rfshare-${{ github.ref_name }}-windows-x64.msi\` | \`rfshare-windows-${{ github.ref_name }}.zip\` |"
            echo ""
            echo "Each file has a matching \`.sha256\` checksum."
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: rfshare ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.NOTES }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-assets/rfshare-linux-${{ github.ref_name }}.tar.gz
            release-assets/rfshare-linux-${{ github.ref_name }}.tar.gz.sha256
            release-assets/rfshare-macos-${{ github.ref_name }}.tar.gz
            release-assets/rfshare-macos-${{ github.ref_name }}.tar.gz.sha256
            release-assets/rfshare-windows-${{ github.ref_name }}.zip
            release-assets/rfshare-windows-${{ github.ref_name }}.zip.sha256
            release-assets/rfshare-${{ github.ref_name }}-linux-x86_64.deb
            release-assets/rfshare-${{ github.ref_name }}-linux-x86_64.deb.sha256
            release-assets/rfshare-${{ github.ref_name }}-macos.dmg
            release-assets/rfshare-${{ github.ref_name }}-macos.dmg.sha256
            release-assets/rfshare-${{ github.ref_name }}-windows-x64.msi
            release-assets/rfshare-${{ github.ref_name }}-windows-x64.msi.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
